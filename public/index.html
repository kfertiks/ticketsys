<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>System zamówień / ticketów</title>
  <style>
    :root {
      --bg: #111827;
      --panel: #1f2937;
      --line: #374151;
      --text: #f3f4f6;
      --muted: #9ca3af;
      --accent: #d97706;
      --accent-2: #92400e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #0b1220 0%, #111827 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .sub {
      color: var(--muted);
      margin-bottom: 24px;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 20px;
    }

    .card {
      background: rgba(31, 41, 55, 0.94);
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
    }

    .card-head {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(15, 23, 42, 0.6);
    }

    .card-body {
      padding: 20px;
    }

    .row {
      display: grid;
      gap: 12px;
      margin-bottom: 12px;
    }

    .row-2 {
      grid-template-columns: 1fr 1fr;
    }

    .row-3 {
      grid-template-columns: 1fr 1fr 1fr;
    }

    input, textarea, button, select {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      padding: 12px 14px;
      font-size: 14px;
    }

    input, textarea, select {
      background: #0b1220;
      color: var(--text);
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    button {
      background: var(--accent);
      color: white;
      font-weight: 700;
      cursor: pointer;
      border: none;
    }

    button:hover {
      background: var(--accent-2);
    }

    .table-wrap {
      overflow: auto;
      max-height: 525px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 14px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      color: var(--muted);
      font-weight: 600;
    }

    tr.ticket-row {
      cursor: pointer;
    }

    tr.ticket-row:hover {
      background: rgba(255,255,255,0.03);
    }

    tr.ticket-row.active {
      background: rgba(217,119,6,0.12);
    }

    .pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(217,119,6,0.15);
      border: 1px solid rgba(217,119,6,0.35);
      color: #fdba74;
      font-size: 12px;
      font-weight: 700;
    }

    .muted {
      color: var(--muted);
    }

    .ticket-meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .reply-tree {
      margin-top: 20px;
      display: grid;
      gap: 12px;
    }

    .reply {
      border: 1px solid var(--line);
      background: rgba(11, 18, 32, 0.7);
      border-radius: 14px;
      padding: 14px;
    }

    .reply-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .reply-children {
      margin-top: 12px;
      margin-left: 24px;
      border-left: 2px solid rgba(255,255,255,0.08);
      padding-left: 12px;
      display: grid;
      gap: 12px;
    }

    .reply-actions {
      margin-top: 10px;
    }

    .small-btn {
      width: auto;
      padding: 8px 12px;
      font-size: 12px;
      background: #1d4ed8;
    }

    .small-btn:hover {
      background: #1e40af;
    }

    .inline-form {
      margin-top: 12px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--line);
      display: none;
    }

    .inline-form.open {
      display: block;
    }

    .empty {
      color: var(--muted);
      padding: 20px 0;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .row-2,
      .row-3 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>System zamówień / ticketów</h1>
    <div class="sub">Tickety, flairy, ręczne odpowiedzi i status z ostatniego flairu.</div>

    <div class="layout">
      <div class="card">
        <div class="card-head"><strong>Nowe zamówienie</strong></div>
        <div class="card-body">
          <form id="ticket-form">
            <div class="row row-2">
              <input id="ticket-number" placeholder="Numer zamówienia, np. ZAM-003" required />
              <input id="ticket-title" placeholder="Tytuł zamówienia" required />
            </div>

            <div class="row row-3">
              <input id="ticket-flair" placeholder="Początkowy flair, np. Nowe" />
              <select id="ticket-preset-flair">
                <option value="">Wybierz gotowy flair</option>
                <option value="Nowe">Nowe</option>
                <option value="Czeka na wycenę">Czeka na wycenę</option>
                <option value="Wycenione">Wycenione</option>
                <option value="Wysłane">Wysłane</option>
                <option value="W produkcji">W produkcji</option>
                <option value="Oczekuje na wysyłkę">Oczekuje na wysyłkę</option>
              </select>
              <input id="ticket-value" type="number" min="0" step="0.01" placeholder="Wartość zamówienia" />
            </div>

            <div class="row row-2">
              <input id="ticket-search" placeholder="Szukaj po numerze lub tytule" />
              <select id="ticket-status-filter">
                <option value="">Wszystkie statusy</option>
                <option value="Nowe">Nowe</option>
                <option value="Czeka na wycenę">Czeka na wycenę</option>
                <option value="Wycenione">Wycenione</option>
                <option value="Wysłane">Wysłane</option>
                <option value="W produkcji">W produkcji</option>
                <option value="Oczekuje na wysyłkę">Oczekuje na wysyłkę</option>
              </select>
            </div>

            <div class="row">
              <textarea id="ticket-description" placeholder="Opis zamówienia"></textarea>
            </div>

            <button type="submit">Dodaj zamówienie</button>
          </form>
        </div>
      </div>

      <div class="card">
        <div class="card-head"><strong>Lista zamówień</strong></div>
        <div class="card-body table-wrap">
          <table>
            <thead>
              <tr>
                <th>Status</th>
                <th>Numer</th>
                <th>Tytuł</th>
                <th>Wartość</th>
                <th>Data aktualizacji</th>
              </tr>
            </thead>
            <tbody id="tickets-body"></tbody>
          </table>
        </div>
        <div id="tickets-total" class="card-body" style="padding-top:0; color:#9ca3af; font-weight:700;">
          Łączna suma: 0 zł
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:20px;">
      <div class="card-head"><strong>Szczegóły zamówienia</strong></div>
      <div class="card-body" id="details"></div>
    </div>
  </div>

  <script>
    let tickets = [];
    let selectedTicketId = null;
    let searchValue = '';
    let selectedStatusFilter = '';

    const PRESET_FLAIRS = [
      'Nowe',
      'Czeka na wycenę',
      'Wycenione',
      'Wysłane',
      'W produkcji',
      'Oczekuje na wysyłkę'
    ];

    const ticketsBody = document.getElementById('tickets-body');
    const details = document.getElementById('details');
    const ticketForm = document.getElementById('ticket-form');
    const searchInput = document.getElementById('ticket-search');
    const ticketsTotal = document.getElementById('tickets-total');
    const statusFilterInput = document.getElementById('ticket-status-filter');
    const ticketPresetFlairInput = document.getElementById('ticket-preset-flair');
    const ticketFlairInput = document.getElementById('ticket-flair');

    function escapeHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function formatDate(date) {
      const d = new Date(date);
      if (isNaN(d)) return date || '';
      return d.toLocaleString('pl-PL');
    }

    function formatCurrency(value) {
      return new Intl.NumberFormat('pl-PL', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      }).format(Number(value) || 0) + ' zł';
    }

function renderPrintableReplies(nodes, level = 0) {
  return nodes.map(node => `
    <div class="reply" style="margin-left:${level * 20}px;">
      <div>
        <strong>Flair:</strong> ${escapeHtml(node.flair || '')}
      </div>
      <div class="reply-date">${escapeHtml(formatDate(node.created_at))}</div>
      <div>${escapeHtml(node.content || '').replace(/\n/g, '<br>')}</div>
      ${node.children && node.children.length ? renderPrintableReplies(node.children, level + 1) : ''}
    </div>
  `).join('');
}

    function collectFlairHistory(nodes, result = []) {
      for (const node of nodes) {
        if (node.flair) {
          result.push({
            flair: node.flair,
            created_at: node.created_at
          });
        }
        if (node.children && node.children.length) {
          collectFlairHistory(node.children, result);
        }
      }
      return result;
    }

    async function fetchTickets() {
      const res = await fetch('/api/tickets');
      tickets = await res.json();
      renderTickets();

      if (!selectedTicketId && tickets.length) {
        selectedTicketId = tickets[0].id;
      }

      if (selectedTicketId) {
        await renderDetails(selectedTicketId);
      } else {
        details.innerHTML = '<div class="empty">Brak zamówień.</div>';
      }
    }

    function renderTickets() {
      const filtered = tickets.filter(t => {
        const hay = (t.number + ' ' + t.title).toLowerCase();
        const matchesSearch = hay.includes(searchValue.toLowerCase());
        const matchesStatus = !selectedStatusFilter || (t.status || '') === selectedStatusFilter;
        return matchesSearch && matchesStatus;
      });

      if (!filtered.length) {
        ticketsBody.innerHTML = '<tr><td colspan="5" class="muted">Brak wyników.</td></tr>';
        ticketsTotal.innerHTML = 'Łączna suma: 0,00 zł';
        return;
      }

      ticketsBody.innerHTML = filtered.map(ticket => `
        <tr class="ticket-row ${ticket.id === selectedTicketId ? 'active' : ''}" data-id="${ticket.id}">
          <td><span class="pill">${escapeHtml(ticket.status || '')}</span></td>
          <td>${escapeHtml(ticket.number)}</td>
          <td>${escapeHtml(ticket.title)}</td>
          <td>${escapeHtml(formatCurrency(ticket.value))}</td>
          <td>${escapeHtml(formatDate(ticket.updated_at))}</td>
        </tr>
      `).join('');

      const total = filtered.reduce((sum, ticket) => sum + (Number(ticket.value) || 0), 0);
      ticketsTotal.innerHTML = 'Łączna suma: ' + escapeHtml(formatCurrency(total));

      document.querySelectorAll('.ticket-row').forEach(row => {
        row.addEventListener('click', async () => {
          selectedTicketId = Number(row.dataset.id);
          renderTickets();
          await renderDetails(selectedTicketId);
        });
      });
    }

    function renderReplyNode(reply, ticketId) {
      const childrenHtml = reply.children && reply.children.length
        ? '<div class="reply-children">' + reply.children.map(child => renderReplyNode(child, ticketId)).join('') + '</div>'
        : '';

      const presetOptions = PRESET_FLAIRS.map(flair => `<option value="${escapeHtml(flair)}">${escapeHtml(flair)}</option>`).join('');

      return `
        <div class="reply">
          <div class="reply-head">
            <div><span class="pill">${escapeHtml(reply.flair || '')}</span></div>
            <div class="muted">${escapeHtml(formatDate(reply.created_at))}</div>
          </div>
          <div>${escapeHtml(reply.content).replace(/\n/g, '<br>')}</div>
          <div class="reply-actions">
            <button type="button" class="small-btn" onclick="toggleReplyForm(${reply.id})">Odpowiedz</button>
          </div>
          <div id="reply-form-${reply.id}" class="inline-form">
            <div class="row row-2">
              <input id="reply-flair-${reply.id}" placeholder="Flair odpowiedzi" />
              <select onchange="document.getElementById('reply-flair-${reply.id}').value = this.value || document.getElementById('reply-flair-${reply.id}').value">
                <option value="">Wybierz gotowy flair</option>
                ${presetOptions}
              </select>
            </div>
            <div class="row">
              <textarea id="reply-content-${reply.id}" placeholder="Treść odpowiedzi" required></textarea>
            </div>
            <button type="button" onclick="submitReplyById(${ticketId}, ${reply.id})">Dodaj odpowiedź</button>
          </div>
          ${childrenHtml}
        </div>
      `;
    }

    window.toggleReplyForm = function(replyId) {
      const el = document.getElementById(`reply-form-${replyId}`);
      el.classList.toggle('open');
    };

    window.submitReplyById = async function(ticketId, parentReplyId) {
      const flairInput = document.getElementById(`reply-flair-${parentReplyId}`);
      const contentInput = document.getElementById(`reply-content-${parentReplyId}`);

      const flair = flairInput ? flairInput.value.trim() : '';
      const content = contentInput ? contentInput.value.trim() : '';

      if (!content) {
        alert('Treść odpowiedzi jest wymagana.');
        return;
      }

      try {
        const res = await fetch(`/api/tickets/${ticketId}/replies`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            parent_reply_id: parentReplyId,
            flair,
            content
          })
        });

        const data = await res.json();

        if (!res.ok) {
          alert(data.error || 'Błąd przy dodawaniu odpowiedzi.');
          return;
        }

        await fetchTickets();
      } catch (err) {
        console.error(err);
        alert('Nie udało się wysłać odpowiedzi.');
      }
    };

    async function renderDetails(ticketId) {
      const res = await fetch(`/api/tickets/${ticketId}`);
      const ticket = await res.json();

      if (!res.ok) {
        details.innerHTML = `<div class="empty">${escapeHtml(ticket.error || 'Błąd')}</div>`;
        return;
      }

      const flairHistory = [];

      if (ticket.flair) {
        flairHistory.push({
          flair: ticket.flair,
          created_at: ticket.created_at
        });
      }

      collectFlairHistory(ticket.replies || [], flairHistory);

      flairHistory.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

      const presetOptions = PRESET_FLAIRS.map(flair => `<option value="${escapeHtml(flair)}">${escapeHtml(flair)}</option>`).join('');

      details.innerHTML = `
        <div>
          <div style="display:flex; justify-content:space-between; gap:12px; align-items:flex-start; flex-wrap:wrap;">
            <div>
              <h2 style="margin:0 0 6px;">${escapeHtml(ticket.number)} — ${escapeHtml(ticket.title)}</h2>
              <div><span class="pill">${escapeHtml(ticket.status || '')}</span></div>
            </div>
<div style="display:flex; gap:8px; flex-wrap:wrap;">
  <button id="print-ticket-btn" style="background:#059669;">Drukuj zamówienie</button>
  <button id="edit-value-btn" style="background:#2563eb;">Zmień wartość</button>
  <button id="delete-ticket-btn" style="background:#b91c1c;">Usuń zamówienie</button>
</div>
          </div>

          <div class="ticket-meta">
            <span>Utworzono: ${escapeHtml(formatDate(ticket.created_at))}</span>
            <span>Ostatnia zmiana: ${escapeHtml(formatDate(ticket.updated_at))}</span>
            <span>Wartość zamówienia: ${escapeHtml(formatCurrency(ticket.value))}</span>
          </div>

          <div style="margin-top:16px; white-space:pre-wrap;">${escapeHtml(ticket.description || '')}</div>

          <div class="card" style="margin-top:20px;">
            <div class="card-head"><strong>Historia flairów</strong></div>
            <div class="card-body">
              ${
                flairHistory.length
                  ? flairHistory.map(item => `
                      <div style="display:flex; justify-content:space-between; gap:12px; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.06);">
                        <span class="pill">${escapeHtml(item.flair)}</span>
                        <span class="muted">${escapeHtml(formatDate(item.created_at))}</span>
                      </div>
                    `).join('')
                  : '<div class="empty">Brak historii flairów.</div>'
              }
            </div>
          </div>

          <div class="card" style="margin-top:20px;">
            <div class="card-head"><strong>Dodaj odpowiedź główną</strong></div>
            <div class="card-body">
              <form id="root-reply-form">
                <div class="row row-2">
                  <input id="root-reply-flair" placeholder="Flair odpowiedzi" />
                  <select id="root-reply-preset-flair">
                    <option value="">Wybierz gotowy flair</option>
                    ${presetOptions}
                  </select>
                </div>
                <div class="row">
                  <textarea id="root-reply-content" placeholder="Treść odpowiedzi" required></textarea>
                </div>
                <button type="submit">Dodaj odpowiedź</button>
              </form>
            </div>
          </div>

          <div class="reply-tree">
            ${ticket.replies.length
              ? ticket.replies.map(reply => renderReplyNode(reply, ticket.id)).join('')
              : '<div class="empty">Brak odpowiedzi.</div>'}
          </div>
        </div>
      `;

const printBtn = document.getElementById('print-ticket-btn');
printBtn.addEventListener('click', () => {
  const printWindow = window.open('', '_blank');

  const repliesHtml = (ticket.replies && ticket.replies.length)
    ? renderPrintableReplies(ticket.replies)
    : '<p>Brak odpowiedzi.</p>';

  printWindow.document.write(`
    <!doctype html>
    <html lang="pl">
    <head>
      <meta charset="UTF-8">
      <title>Druk zamówienia ${escapeHtml(ticket.number)}</title>
      <style>
        body {
          font-family: Arial, Helvetica, sans-serif;
          margin: 30px;
          color: #111;
        }
        h1, h2, h3 {
          margin-bottom: 10px;
        }
        .meta {
          margin-bottom: 20px;
          color: #444;
        }
        .section {
          margin-top: 24px;
        }
        .pill {
          display: inline-block;
          padding: 4px 8px;
          border: 1px solid #999;
          border-radius: 999px;
          font-size: 12px;
          margin-left: 8px;
        }
        .reply {
          border-left: 2px solid #ccc;
          padding-left: 12px;
          margin-top: 12px;
        }
        .reply-date {
          color: #666;
          font-size: 12px;
          margin-bottom: 6px;
        }
      </style>
    </head>
    <body>
      <h1>Zamówienie ${escapeHtml(ticket.number)}</h1>
      <div class="meta">
        <div><strong>Tytuł:</strong> ${escapeHtml(ticket.title)}</div>
        <div><strong>Status:</strong> ${escapeHtml(ticket.status || '')}</div>
        <div><strong>Wartość:</strong> ${escapeHtml(formatCurrency(ticket.value))}</div>
        <div><strong>Utworzono:</strong> ${escapeHtml(formatDate(ticket.created_at))}</div>
        <div><strong>Ostatnia zmiana:</strong> ${escapeHtml(formatDate(ticket.updated_at))}</div>
      </div>

      <div class="section">
        <h2>Opis</h2>
        <div>${escapeHtml(ticket.description || '').replace(/\n/g, '<br>')}</div>
      </div>

      <div class="section">
        <h2>Odpowiedzi / historia</h2>
        ${repliesHtml}
      </div>
    </body>
    </html>
  `);

  printWindow.document.close();
  printWindow.focus();
  printWindow.print();
});

      const editValueBtn = document.getElementById('edit-value-btn');
      editValueBtn.addEventListener('click', async () => {

        

        const currentValue = Number(ticket.value) || 0;
        const newValueRaw = prompt('Podaj nową wartość zamówienia:', currentValue);

        if (newValueRaw === null) return;

        const newValue = Number(String(newValueRaw).replace(',', '.'));
        if (!Number.isFinite(newValue) || newValue < 0) {
          alert('Podaj poprawną wartość.');
          return;
        }

        const res = await fetch(`/api/tickets/${ticketId}/value`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ value: newValue })
        });

        const data = await res.json();

        if (!res.ok) {
          alert(data.error || 'Błąd przy zmianie wartości.');
          return;
        }

        await fetchTickets();
      });

      const deleteBtn = document.getElementById('delete-ticket-btn');
      deleteBtn.addEventListener('click', async () => {
        const confirmed = confirm(`Usunąć zamówienie ${ticket.number}?`);
        if (!confirmed) return;

        const res = await fetch(`/api/tickets/${ticketId}`, {
          method: 'DELETE'
        });

        const data = await res.json();

        if (!res.ok) {
          alert(data.error || 'Błąd przy usuwaniu zamówienia.');
          return;
        }

        selectedTicketId = null;
        details.innerHTML = '<div class="empty">Zamówienie usunięte.</div>';
        await fetchTickets();
      });

      const presetFlairSelect = document.getElementById('root-reply-preset-flair');
      const rootFlairInput = document.getElementById('root-reply-flair');

      presetFlairSelect.addEventListener('change', () => {
        if (presetFlairSelect.value) {
          rootFlairInput.value = presetFlairSelect.value;
        }
      });

      const form = document.getElementById('root-reply-form');
      form.addEventListener('submit', async (event) => {
        event.preventDefault();

        const flair = document.getElementById('root-reply-flair').value.trim();
        const content = document.getElementById('root-reply-content').value.trim();

        if (!content) {
          alert('Treść odpowiedzi jest wymagana.');
          return;
        }

        const res = await fetch(`/api/tickets/${ticketId}/replies`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            flair,
            content,
            parent_reply_id: null
          })
        });

        const data = await res.json();

        if (!res.ok) {
          alert(data.error || 'Błąd przy dodawaniu odpowiedzi.');
          return;
        }

        await fetchTickets();
      });
    }

    ticketForm.addEventListener('submit', async (event) => {
      event.preventDefault();

      const number = document.getElementById('ticket-number').value.trim();
      const title = document.getElementById('ticket-title').value.trim();
      const description = document.getElementById('ticket-description').value.trim();
      const flair = document.getElementById('ticket-flair').value.trim();
      const value = document.getElementById('ticket-value').value.trim();

      const res = await fetch('/api/tickets', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ number, title, description, flair, value })
      });

      const data = await res.json();

      if (!res.ok) {
        alert(data.error || 'Błąd przy dodawaniu zamówienia.');
        return;
      }

      ticketForm.reset();
      selectedTicketId = data.id;
      await fetchTickets();
    });

    searchInput.addEventListener('input', (e) => {
      searchValue = e.target.value || '';
      renderTickets();
    });

    statusFilterInput.addEventListener('change', (e) => {
      selectedStatusFilter = e.target.value || '';
      renderTickets();
    });

    ticketPresetFlairInput.addEventListener('change', () => {
      if (ticketPresetFlairInput.value) {
        ticketFlairInput.value = ticketPresetFlairInput.value;
      }
    });

    fetchTickets();
  </script>
</body>
</html>
